<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Job applicants — ServeConnect</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">
  <nav class="nav">
    <a href="index.html" class="brand">Serve<span>Connect</span></a>
    <div class="nav-links">
      <a href="my-jobs.html">My jobs</a>
      <a href="post-job.html">Post a job</a>
      <a href="#" onclick="logout()">Log out</a>
    </div>
  </nav>

  <div class="dash-header">
    <h1 class="dash-title" id="jobTitle">Loading...</h1>
    <button class="btn btn-outline btn-sm" id="cancelBtn" onclick="cancelJob()">Cancel job</button>
  </div>

  <div id="jobMeta" style="color:var(--text-muted); margin-bottom:24px;"></div>
  <div id="alertBox"></div>

  <h3 style="font-family:var(--font-display);">Applicants</h3>
  <div id="applicantsContainer"></div>

  <footer>ServeConnect · Built for caterers, event organizers, and the students who staff them.</footer>
</div>

<script src="js/api.js"></script>
<script>
  const user = requireLogin('caterer');
  const jobId = new URLSearchParams(window.location.search).get('id');

  if (!jobId) window.location.href = 'my-jobs.html';

  let currentJobStatus = null;

  async function loadJob() {
    try {
      const data = await apiRequest(`/applications/job/${jobId}`);
      const job = data.job;
      currentJobStatus = job.status;
      document.getElementById('jobTitle').textContent = job.title;
      document.getElementById('jobMeta').innerHTML =
        `📅 ${formatDate(job.event_date)} · 🕐 ${formatTime(job.start_time)}–${formatTime(job.end_time)} · 📍 ${escapeHtml(job.location)} · ₹${Number(job.pay_rate).toLocaleString('en-IN')} per worker ·
         <span class="badge badge-${job.status}">${job.workers_confirmed}/${job.workers_needed} confirmed · ${job.status}</span>`;
      renderApplicants(data.applicants);
    } catch (err) {
      document.getElementById('alertBox').innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
    }
  }

  function renderApplicants(applicants) {
    const container = document.getElementById('applicantsContainer');
    if (applicants.length === 0) {
      container.innerHTML = `<div class="empty-state"><h3>No applicants yet</h3><p>Students will show up here as they apply.</p></div>`;
      return;
    }

    container.innerHTML = applicants.map(a => `
      <div class="applicant-row">
        <div class="applicant-info">
          <div class="avatar-chip">${a.full_name.charAt(0).toUpperCase()}</div>
          <div class="name-block">
            <span class="name">${escapeHtml(a.full_name)}</span>
            <span class="meta">${escapeHtml(a.college_name || 'No college listed')} · ${a.phone} · ⭐ ${a.reliability_score || 'New'} · ${a.total_gigs_completed} gigs completed</span>
          </div>
        </div>
        <div class="applicant-actions">
          <span class="badge badge-${a.status}">${a.status.replace('_', ' ')}</span>
          ${a.status === 'applied' ? `
            <button class="btn btn-brass btn-sm" onclick="selectApplicant('${a.application_id}')">Select</button>
            <button class="btn btn-outline btn-sm" onclick="rejectApplicant('${a.application_id}')">Reject</button>
          ` : ''}
          ${a.status === 'confirmed' && currentJobStatus !== 'completed' ? `
            <button class="btn btn-danger btn-sm" onclick="markNoShow('${a.application_id}')">Mark no-show</button>
          ` : ''}
          ${a.status === 'confirmed' && currentJobStatus === 'completed' ? `
            <a class="btn btn-brass btn-sm" href="rate.html?job_id=${jobId}&to_user_id=${a.student_id}&to_name=${encodeURIComponent(a.full_name)}&return_to=job-detail.html?id=${jobId}">Rate student</a>
          ` : ''}
        </div>
      </div>
    `).join('');
  }

  async function selectApplicant(id) {
    try {
      await apiRequest(`/applications/${id}/select`, { method: 'PATCH' });
      loadJob();
    } catch (err) { alert(err.message); }
  }

  async function rejectApplicant(id) {
    try {
      await apiRequest(`/applications/${id}/reject`, { method: 'PATCH' });
      loadJob();
    } catch (err) { alert(err.message); }
  }

  async function markNoShow(id) {
    if (!confirm('Mark this worker as a no-show? This affects their reliability score.')) return;
    try {
      await apiRequest(`/applications/${id}/no-show`, { method: 'PATCH' });
      loadJob();
    } catch (err) { alert(err.message); }
  }

  async function cancelJob() {
    if (!confirm('Cancel this job posting?')) return;
    try {
      await apiRequest(`/jobs/${jobId}/cancel`, { method: 'PATCH' });
      window.location.href = 'my-jobs.html';
    } catch (err) { alert(err.message); }
  }

  loadJob();
</script>

</body>
</html>
