<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My applications — ServeConnect</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">
  <nav class="nav">
    <a href="index.html" class="brand">Serve<span>Connect</span></a>
    <div class="nav-links">
      <a href="jobs.html">Browse jobs</a>
      <a href="my-applications.html">My applications</a>
      <a href="#" onclick="logout()">Log out</a>
    </div>
  </nav>

  <div class="dash-header">
    <h1 class="dash-title">My applications</h1>
  </div>

  <div id="alertBox"></div>
  <div id="appsContainer"></div>

  <footer>ServeConnect · Built for caterers, event organizers, and the students who staff them.</footer>
</div>

<script src="js/api.js"></script>
<script>
  const user = requireLogin('student');

  async function loadApplications() {
    const container = document.getElementById('appsContainer');
    container.innerHTML = '<p>Loading...</p>';
    try {
      const data = await apiRequest('/applications/mine');
      renderApplications(data.applications);
    } catch (err) {
      container.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
    }
  }

  function renderApplications(apps) {
    const container = document.getElementById('appsContainer');
    if (apps.length === 0) {
      container.innerHTML = `<div class="empty-state"><h3>No applications yet</h3><p>Browse open gigs and apply to get started.</p><br><a href="jobs.html" class="btn btn-brass">Browse jobs</a></div>`;
      return;
    }

    container.innerHTML = apps.map(app => {
      const isSelected = app.status === 'selected';
      const deadlinePassed = app.confirmation_deadline && new Date(app.confirmation_deadline) < new Date();

      return `
        <div class="applicant-row">
          <div class="applicant-info">
            <span class="name">${escapeHtml(app.title)}</span>
            <span class="meta">${escapeHtml(app.business_name || app.caterer_name)} · ${formatDate(app.event_date)}, ${formatTime(app.start_time)}–${formatTime(app.end_time)} · ${escapeHtml(app.location)} · ₹${Number(app.pay_rate).toLocaleString('en-IN')}</span>
            ${isSelected && !deadlinePassed ? `<span class="meta" style="color:var(--red-alert);">Confirm by ${new Date(app.confirmation_deadline).toLocaleString('en-IN')}</span>` : ''}
          </div>
          <div class="applicant-actions">
            <span class="badge badge-${app.status}">${app.status.replace('_', ' ')}</span>
            ${isSelected && !deadlinePassed ? `<button class="btn btn-brass btn-sm" onclick="confirmApp('${app.application_id}')">Confirm</button>` : ''}
            ${['applied', 'selected'].includes(app.status) ? `<button class="btn btn-outline btn-sm" onclick="withdrawApp('${app.application_id}')">Withdraw</button>` : ''}
            ${app.status === 'confirmed' && app.job_status === 'completed' ? `<a class="btn btn-brass btn-sm" href="rate.html?job_id=${app.job_id}&to_user_id=${app.caterer_id}&to_name=${encodeURIComponent(app.business_name || app.caterer_name)}&return_to=my-applications.html">Rate caterer</a>` : ''}
          </div>
        </div>
      `;
    }).join('');
  }

  async function confirmApp(id) {
    try {
      const res = await apiRequest(`/applications/${id}/confirm`, { method: 'PATCH' });
      document.getElementById('alertBox').innerHTML = `<div class="alert alert-success">${escapeHtml(res.message)}</div>`;
      loadApplications();
    } catch (err) {
      document.getElementById('alertBox').innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
    }
  }

  async function withdrawApp(id) {
    if (!confirm('Withdraw this application?')) return;
    try {
      await apiRequest(`/applications/${id}/withdraw`, { method: 'PATCH' });
      loadApplications();
    } catch (err) {
      alert(err.message);
    }
  }

  loadApplications();
</script>

</body>
</html>
