<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My jobs — ServeConnect</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">
  <nav class="nav">
    <a href="index.html" class="brand">Serve<span>Connect</span></a>
    <div class="nav-links">
      <a href="my-jobs.html">My jobs</a>
      <a href="post-job.html">Post a job</a>
      <a href="#" onclick="logout()">Log out</a>
    </div>
  </nav>

  <div class="dash-header">
    <h1 class="dash-title">My jobs <span class="muted" id="userGreeting"></span></h1>
    <a href="post-job.html" class="btn btn-brass">+ Post a job</a>
  </div>

  <div id="jobsContainer"></div>

  <footer>ServeConnect · Built for caterers, event organizers, and the students who staff them.</footer>
</div>

<script src="js/api.js"></script>
<script>
  const user = requireLogin('caterer');
  if (user) document.getElementById('userGreeting').textContent = `— ${user.business_name || user.full_name}`;

  async function loadJobs() {
    const container = document.getElementById('jobsContainer');
    container.innerHTML = '<p>Loading...</p>';
    try {
      const data = await apiRequest('/jobs/mine');
      renderJobs(data.jobs);
    } catch (err) {
      container.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
    }
  }

  function renderJobs(jobs) {
    const container = document.getElementById('jobsContainer');
    if (jobs.length === 0) {
      container.innerHTML = `<div class="empty-state"><h3>No jobs posted yet</h3><p>Post your first job to start receiving applicants.</p><br><a href="post-job.html" class="btn btn-brass">Post a job</a></div>`;
      return;
    }
    container.innerHTML = `<div class="job-grid">${jobs.map(jobCard).join('')}</div>`;
  }

  function jobCard(job) {
    return `
      <div class="job-card" id="jobCard-${job.id}">
        <div class="pay">₹${Number(job.pay_rate).toLocaleString('en-IN')}</div>
        <h3>${escapeHtml(job.title)}</h3>
        <div class="job-meta">
          <div class="row">📅 ${formatDate(job.event_date)}</div>
          <div class="row">🕐 ${formatTime(job.start_time)} – ${formatTime(job.end_time)}</div>
          <div class="row">📍 ${escapeHtml(job.location)}</div>
        </div>
        <div class="job-card-footer">
          <span class="badge badge-${job.status}">${job.workers_confirmed}/${job.workers_needed} confirmed · ${job.status}</span>
          <span class="badge badge-open">${job.applicants_count || 0} applicant${Number(job.applicants_count) === 1 ? '' : 's'}</span>
          <button type="button" class="btn btn-outline btn-sm" onclick="viewApplicants('${job.id}')">View applicants</button>
        </div>
        <div class="job-applicants" id="jobApplicants-${job.id}" style="display:none;"></div>
      </div>
    `;
  }

  function viewApplicants(jobId) {
    const panel = document.getElementById(`jobApplicants-${jobId}`);
    const button = document.querySelector(`#jobCard-${jobId} .btn-outline`);

    if (!panel) return;

    if (panel.dataset.loaded === 'true') {
      const isHidden = panel.style.display === 'none';
      panel.style.display = isHidden ? 'block' : 'none';
      if (button) button.textContent = isHidden ? 'Hide applicants' : 'View applicants';
      return;
    }

    panel.style.display = 'block';
    panel.innerHTML = '<p style="margin:0; color:var(--text-muted);">Loading applicants...</p>';
    if (button) button.textContent = 'Hide applicants';

    apiRequest(`/applications/job/${jobId}`)
      .then((data) => {
        panel.dataset.loaded = 'true';
        if (!data.applicants || data.applicants.length === 0) {
          panel.innerHTML = '<div class="empty-state" style="margin-top:14px;"><h3>No applicants yet</h3><p>Students will show up here as they apply.</p></div>';
          return;
        }

        panel.innerHTML = data.applicants.map((a) => `
          <div class="applicant-row" style="margin-top:14px;">
            <div class="applicant-info">
              <span class="name">${escapeHtml(a.full_name)}</span>
              <span class="meta">${escapeHtml(a.college_name || 'No college listed')} · ${escapeHtml(a.phone)} · ⭐ ${a.reliability_score || 'New'} · ${a.total_gigs_completed} gigs completed</span>
            </div>
            <div class="applicant-actions">
              <span class="badge badge-${a.status}">${a.status.replace('_', ' ')}</span>
              ${a.status === 'applied' ? `
                <button class="btn btn-brass btn-sm" onclick="selectApplicant('${a.application_id}')">Select</button>
                <button class="btn btn-outline btn-sm" onclick="rejectApplicant('${a.application_id}')">Reject</button>
              ` : ''}
              ${a.status === 'confirmed' ? `
                <button class="btn btn-danger btn-sm" onclick="markNoShow('${a.application_id}')">Mark no-show</button>
              ` : ''}
            </div>
          </div>
        `).join('');
      })
      .catch((err) => {
        panel.dataset.loaded = 'true';
        panel.innerHTML = `<div class="alert alert-error" style="margin-top:14px;">${escapeHtml(err.message)}</div>`;
      });
  }

  loadJobs();
</script>

</body>
</html>
