<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My jobs — ServeConnect</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">
  <nav class="nav">
    <a href="index.html" class="brand">Serve<span>Connect</span></a>
    <div class="nav-links">
      <a href="my-jobs.html">My jobs</a>
      <a href="post-job.html">Post a job</a>
      <a href="#" onclick="logout()">Log out</a>
    </div>
  </nav>

  <div class="dash-header">
    <h1 class="dash-title">My jobs <span class="muted" id="userGreeting"></span></h1>
    <a href="post-job.html" class="btn btn-brass">+ Post a job</a>
  </div>

  <div id="jobsContainer"></div>

  <footer>ServeConnect · Built for caterers, event organizers, and the students who staff them.</footer>
</div>

<script src="js/api.js"></script>
<script>
  const user = requireLogin('caterer');
  if (user) document.getElementById('userGreeting').textContent = `— ${user.business_name || user.full_name}`;

  async function loadJobs() {
    const container = document.getElementById('jobsContainer');
    container.innerHTML = '<p>Loading...</p>';
    try {
      const data = await apiRequest('/jobs/mine');
      renderJobs(data.jobs);
    } catch (err) {
      container.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
    }
  }

  function renderJobs(jobs) {
    const container = document.getElementById('jobsContainer');
    if (jobs.length === 0) {
      container.innerHTML = `<div class="empty-state"><h3>No jobs posted yet</h3><p>Post your first job to start receiving applicants.</p><br><a href="post-job.html" class="btn btn-brass">Post a job</a></div>`;
      return;
    }
    container.innerHTML = `<div class="job-grid">${jobs.map(jobCard).join('')}</div>`;
  }

  function jobCard(job) {
    return `
      <div class="job-card">
        <div class="pay">₹${Number(job.pay_rate).toLocaleString('en-IN')}</div>
        <h3>${escapeHtml(job.title)}</h3>
        <div class="job-meta">
          <div class="row">📅 ${formatDate(job.event_date)}</div>
          <div class="row">🕐 ${formatTime(job.start_time)} – ${formatTime(job.end_time)}</div>
          <div class="row">📍 ${escapeHtml(job.location)}</div>
        </div>
        <div class="job-card-footer">
          <span class="badge badge-${job.status}">${job.workers_confirmed}/${job.workers_needed} confirmed · ${job.status}</span>
          <a href="job-detail.html?id=${job.id}" class="btn btn-outline btn-sm">View applicants</a>
        </div>
      </div>
    `;
  }

  loadJobs();
</script>

</body>
</html>
