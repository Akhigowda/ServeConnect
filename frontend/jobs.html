<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Browse jobs — ServeConnect</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="page">
  <nav class="nav">
    <a href="index.html" class="brand">Serve<span>Connect</span></a>
    <div class="nav-links">
      <a href="jobs.html">Browse jobs</a>
      <a href="my-applications.html">My applications</a>
      <a href="#" onclick="logout()">Log out</a>
    </div>
  </nav>

  <div class="dash-header">
    <h1 class="dash-title">Open gigs <span class="muted" id="userGreeting"></span></h1>
    <input type="text" id="locationFilter" placeholder="Filter by location..." style="padding:10px 14px; border:1.5px solid var(--border-soft); border-radius:8px; width:220px;">
  </div>

  <div id="jobsContainer"></div>

  <footer>ServeConnect · Built for caterers, event organizers, and the students who staff them.</footer>
</div>

<script src="js/api.js"></script>
<script>
  const user = requireLogin('student');
  if (user) document.getElementById('userGreeting').textContent = `— hi, ${user.full_name.split(' ')[0]}`;

  let allJobs = [];

  async function loadJobs() {
    const container = document.getElementById('jobsContainer');
    container.innerHTML = '<p>Loading jobs...</p>';
    try {
      const data = await apiRequest('/jobs');
      allJobs = data.jobs;
      renderJobs(allJobs);
    } catch (err) {
      container.innerHTML = `<div class="alert alert-error">${escapeHtml(err.message)}</div>`;
    }
  }

  function renderJobs(jobs) {
    const container = document.getElementById('jobsContainer');
    if (jobs.length === 0) {
      container.innerHTML = `<div class="empty-state"><h3>No open gigs right now</h3><p>Check back soon — new jobs are posted regularly.</p></div>`;
      return;
    }
    container.innerHTML = `<div class="job-grid">${jobs.map(jobCard).join('')}</div>`;
  }

  function jobCard(job) {
    const spotsLeft = job.workers_needed - job.workers_confirmed;
    return `
      <div class="job-card">
        <div class="pay">₹${Number(job.pay_rate).toLocaleString('en-IN')}</div>
        <h3>${escapeHtml(job.title)}</h3>
        <div class="job-meta">
          <div class="row">📅 ${formatDate(job.event_date)}</div>
          <div class="row">🕐 ${formatTime(job.start_time)} – ${formatTime(job.end_time)}</div>
          <div class="row">📍 ${escapeHtml(job.location)}</div>
          <div class="row">🧑‍🍳 ${escapeHtml(job.business_name || job.caterer_name)}</div>
        </div>
        ${job.description ? `<p class="desc">${escapeHtml(job.description)}</p>` : ''}
        <div class="job-card-footer">
          <span class="badge badge-open">${spotsLeft} spot${spotsLeft === 1 ? '' : 's'} left</span>
          <button class="btn btn-brass btn-sm" onclick="applyToJob('${job.id}', this)">Apply</button>
        </div>
      </div>
    `;
  }

  async function applyToJob(jobId, btn) {
    btn.disabled = true;
    btn.textContent = 'Applying...';
    try {
      await apiRequest('/applications', { method: 'POST', body: { job_id: jobId } });
      btn.textContent = 'Applied ✓';
      btn.classList.remove('btn-brass');
      btn.classList.add('btn-outline');
    } catch (err) {
      alert(err.message);
      btn.disabled = false;
      btn.textContent = 'Apply';
    }
  }

  document.getElementById('locationFilter').addEventListener('input', (e) => {
    const q = e.target.value.toLowerCase();
    renderJobs(allJobs.filter(j => j.location.toLowerCase().includes(q)));
  });

  loadJobs();
</script>

</body>
</html>
